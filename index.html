<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 35px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            margin-top: 20px;
        }
        
        h1 {
            font-size: 32px;
            color: #1a2a3a;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #5a6a7a;
            font-size: 16px;
            margin-bottom: 25px;
        }
        
        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1a2a3a;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #dce3ec;
            border-radius: 10px;
            background: #fafcff;
            transition: border-color 0.2s;
            outline: none;
        }
        
        input[type="number"]:focus {
            border-color: #007bff;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: #007bff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 6px;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }
        
        /* ===== AD CONTAINER ===== */
        .ad-container {
            margin: 28px 0 24px 0;
            padding: 8px 0;
            background: #f8faff;
            border-radius: 12px;
            border: 1px solid #eef2f7;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .ad-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        /* ===== RESULT ===== */
        #result {
            margin-top: 20px;
            padding: 22px 24px;
            background: #f8faff;
            border-radius: 12px;
            border-left: 5px solid #007bff;
            display: none;
        }
        
        #result h3 {
            color: #1a2a3a;
            margin-bottom: 12px;
        }
        
        #result p {
            margin: 6px 0;
            color: #1e2e3e;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 20px;
            margin-top: 8px;
        }
        
        .result-grid .label {
            color: #5a6a7a;
            font-weight: 500;
        }
        
        .result-grid .value {
            font-weight: 600;
            color: #1a2a3a;
        }
        
        .error-box {
            color: #d32f2f;
        }
        
        .error-box h3 {
            color: #d32f2f;
        }
        
        /* ===== EXAMPLE ===== */
        .example-box {
            margin-top: 30px;
            padding: 18px 20px;
            background: #f4f7fb;
            border-radius: 10px;
            border: 1px solid #e6ecf3;
        }
        
        .example-box p {
            font-weight: 600;
            color: #1a2a3a;
            margin-bottom: 8px;
        }
        
        pre {
            background: #1a2a3a;
            color: #e3eaf0;
            padding: 14px 18px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            margin: 0;
        }
        
        /* ===== FOOTER ===== */
        footer {
            width: 100%;
            max-width: 720px;
            margin-top: 30px;
            padding: 20px 10px 10px 10px;
            text-align: center;
            border-top: 1px solid #dce3ec;
            color: #5a6a7a;
            font-size: 14px;
        }
        
        footer a {
            color: #007bff;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 500;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        footer .footer-links {
            margin-top: 10px;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .container {
                padding: 24px 18px;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .result-grid {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            
            .btn {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- MAIN CALCULATOR -->
    <!-- ============================================================ -->
    <div class="container">
        <h1>🧮 Age Calculator</h1>
        <p class="subtitle">Enter your birth year to find your exact age</p>

        <!-- Birth Year Input -->
        <div class="form-group">
            <label for="birthYear">📅 Birth Year</label>
            <input type="number" id="birthYear" placeholder="e.g. 1990" min="1900" max="2026" />
        </div>

        <!-- Current Year Input (optional) -->
        <div class="form-group">
            <label for="currentYear">📆 Current Year <span style="font-weight:400;color:#5a6a7a;">(optional)</span></label>
            <input type="number" id="currentYear" placeholder="Defaults to current year" min="1900" max="2100" />
        </div>

        <!-- Calculate Button -->
        <button class="btn" id="calculateBtn" onclick="calculateAge()">🚀 Calculate Age</button>

        <!-- ========================================================== -->
        <!-- ✅ GOOGLE ADSENSE AD UNIT (PLACED IN A DEDICATED CONTAINER) -->
        <!-- ========================================================== -->
        <div class="ad-container">
            <div class="ad-label">— Sponsored —</div>
            
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1530360687674369"
                 crossorigin="anonymous"></script>
            <!-- Datapurchase ads display -->
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1530360687674369"
                 data-ad-slot="3131226647"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
        <!-- ========================================================== -->
        <!-- ADSENSE AD UNIT ENDS HERE                                  -->
        <!-- ========================================================== -->

        <!-- Result Area -->
        <div id="result"></div>

        <!-- API Example -->
        <div class="example-box">
            <p>📡 Example API Call</p>
            <pre>POST https://node-calculator-ehfg.onrender.com/api/calculate-age
{
    "birthYear": 1990
}</pre>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- FOOTER WITH REQUIRED PAGES                                    -->
    <!-- ============================================================ -->
    <footer>
        <p>&copy; 2026 Age Calculator. All rights reserved.</p>
        <div class="footer-links">
            <a href="/privacy-policy">Privacy Policy</a>
            <a href="/about">About Us</a>
            <a href="/contact">Contact</a>
        </div>
    </footer>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT                                                   -->
    <!-- ============================================================ -->
    <script>
        const API_BASE_URL = 'https://node-calculator-ehfg.onrender.com';

        // Auto-fill current year placeholder
        document.addEventListener('DOMContentLoaded', function() {
            const currentYearInput = document.getElementById('currentYear');
            const currentYear = new Date().getFullYear();
            currentYearInput.placeholder = `Current year (defaults to ${currentYear})`;
            
            // Set max year for birth year
            const birthYearInput = document.getElementById('birthYear');
            birthYearInput.max = currentYear;
        });

        async function calculateAge() {
            const birthYearInput = document.getElementById('birthYear');
            const currentYearInput = document.getElementById('currentYear');
            const resultDiv = document.getElementById('result');
            const button = document.getElementById('calculateBtn');

            const birthYear = birthYearInput.value.trim();
            const currentYear = currentYearInput.value.trim();

            // --- Validate Birth Year ---
            if (!birthYear) {
                alert('⚠️ Please enter your birth year.');
                birthYearInput.focus();
                return;
            }

            const birthYearNum = parseInt(birthYear);
            const thisYear = new Date().getFullYear();

            if (isNaN(birthYearNum) || birthYearNum < 1900 || birthYearNum > thisYear) {
                alert(`⚠️ Please enter a valid birth year between 1900 and ${thisYear}.`);
                birthYearInput.focus();
                return;
            }

            // --- Build Payload ---
            const payload = { birthYear: birthYearNum };

            if (currentYear) {
                const currentYearNum = parseInt(currentYear);
                if (!isNaN(currentYearNum) && currentYearNum >= birthYearNum && currentYearNum <= 2100) {
                    payload.currentYear = currentYearNum;
                } else {
                    alert('⚠️ Please enter a valid current year (must be >= birth year).');
                    currentYearInput.focus();
                    return;
                }
            }

            // --- Show Loading State ---
            button.textContent = '⏳ Calculating...';
            button.classList.add('loading');
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/api/calculate-age`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || data.error || 'API request failed.');
                }

                displayResult(data);

            } catch (error) {
                console.error('API Error:', error);
                resultDiv.innerHTML = `
                    <div class="error-box">
                        <h3>❌ Error</h3>
                        <p>${error.message || 'Failed to connect to the API server.'}</p>
                        <p style="font-size:0.9em;color:#5a6a7a;margin-top:6px;">
                            Backend URL: ${API_BASE_URL}
                        </p>
                    </div>
                `;
                resultDiv.style.display = 'block';
            } finally {
                button.textContent = '🚀 Calculate Age';
                button.classList.remove('loading');
            }
        }

        function displayResult(data) {
            const resultDiv = document.getElementById('result');

            if (data.success && data.data) {
                const d = data.data;
                resultDiv.innerHTML = `
                    <h3>🎉 ${data.message || 'Your Age'}</h3>
                    <div class="result-grid">
                        <span class="label">📅 Birth Year</span>
                        <span class="value">${d.birthYear}</span>
                        
                        <span class="label">📆 Current Year</span>
                        <span class="value">${d.currentYear}</span>
                        
                        <span class="label">🧑 Age</span>
                        <span class="value"><strong>${d.age} years old</strong></span>
                        
                        <span class="label">🏷️ Category</span>
                        <span class="value">${d.category || '—'}</span>
                        
                        <span class="label">♈ Zodiac Sign</span>
                        <span class="value">${d.zodiacSign || '—'}</span>
                        
                        <span class="label">🎯 Next Milestone</span>
                        <span class="value">${d.nextMilestone || '—'} ${d.yearsUntilNextMilestone !== undefined ? `(in ${d.yearsUntilNextMilestone} years)` : ''}</span>
                        
                        <span class="label">📆 Born in Leap Year</span>
                        <span class="value">${d.isLeapYear ? '✅ Yes' : '❌ No'}</span>
                    </div>
                    <p style="font-size:0.8em;color:#8a9aa8;margin-top:12px;">
                        🕒 Calculated: ${data.calculationDate || new Date().toLocaleString()}
                    </p>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="error-box">
                        <h3>❌ Error</h3>
                        <p>${data.message || data.error || 'Unknown error occurred.'}</p>
                    </div>
                `;
            }

            resultDiv.style.display = 'block';
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && (active.id === 'birthYear' || active.id === 'currentYear')) {
                    e.preventDefault();
                    calculateAge();
                }
            }
        });
    </script>

</body>
